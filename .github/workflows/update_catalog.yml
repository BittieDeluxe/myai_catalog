name: Update Model Catalog

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 AM UTC
  workflow_dispatch:        # Allow manual run from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch updated catalog
        env:
          # Optional: add HF_TOKEN as a repo secret for higher API rate limits
          # Settings → Secrets and variables → Actions → New repository secret
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 scripts/update_catalog.py

      - name: Commit and push if catalog changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || (
            git commit -m "chore: update model catalog [skip ci]" &&
            git push
          )
